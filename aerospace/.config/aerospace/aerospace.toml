after-login-command = []
after-startup-command = []
start-at-login = true 

# Normalizations. See: https://nikitabobko.github.io/AeroSpace/guide#normalization
enable-normalization-flatten-containers = true
enable-normalization-opposite-orientation-for-nested-containers = true

accordion-padding = 30

# Possible values: tiles|accordion
default-root-container-layout = 'tiles'

# Possible values: horizontal|vertical|auto
# 'auto' means: wide monitor (anything wider than high) gets horizontal orientation,
#               tall monitor (anything higher than wide) gets vertical orientation
default-root-container-orientation = 'auto'

# Mouse follows focus when focused monitor changes
# Drop it from your config, if you don't like this behavior
# See https://nikitabobko.github.io/AeroSpace/guide#on-focus-changed-callbacks
# See https://nikitabobko.github.io/AeroSpace/commands#move-mouse
# Fallback value (if you omit the key): on-focused-monitor-changed = []
on-focused-monitor-changed = ['move-mouse monitor-lazy-center']

# You can effectively turn off macOS "Hide application" (cmd-h) feature by toggling this flag
# Useful if you don't use this macOS feature, but accidentally hit cmd-h or cmd-alt-h key
# Also see: https://nikitabobko.github.io/AeroSpace/goodies#disable-hide-app
automatically-unhide-macos-hidden-apps = false

# Possible values: (qwerty|dvorak|colemak)
# See https://nikitabobko.github.io/AeroSpace/guide#key-mapping
[key-mapping]
    preset = 'qwerty'

# Gaps between windows (inner-*) and between monitor edges (outer-*).
# Possible values:
# - Constant:     gaps.outer.top = 8
# - Per monitor:  gaps.outer.top = [{ monitor.main = 16 }, { monitor."some-pattern" = 32 }, 24]
#                 In this example, 24 is a default value when there is no match.
#                 Monitor pattern is the same as for 'workspace-to-monitor-force-assignment'.
#                 See:
#                 https://nikitabobko.github.io/AeroSpace/guide#assign-workspaces-to-monitors
[gaps]
    inner.horizontal = 10
    inner.vertical =   10
    outer.left =       10
    outer.bottom =     10
    outer.top =        10
    outer.right =      10
# 'main' binding mode declaration
# See: https://nikitabobko.github.io/AeroSpace/guide#binding-modes
# 'main' binding mode must be always presented
# Fallback value (if you omit the key): mode.main.binding = {}
[mode.main.binding]

    # See: https://nikitabobko.github.io/AeroSpace/commands#layout
    alt-slash = 'layout tiles horizontal vertical'
    alt-comma = 'layout accordion horizontal vertical'

    # See: https://nikitabobko.github.io/AeroSpace/commands#focus
    alt-h = 'focus left'
    alt-j = 'focus down'
    alt-k = 'focus up'
    alt-l = 'focus right'

    # See: https://nikitabobko.github.io/AeroSpace/commands#move
    alt-shift-h = 'move left'
    alt-shift-j = 'move down'
    alt-shift-k = 'move up'
    alt-shift-l = 'move right'

    # See: https://nikitabobko.github.io/AeroSpace/commands#resize
    alt-minus = 'resize smart -50'
    alt-equal = 'resize smart +50'

    # See: https://nikitabobko.github.io/AeroSpace/commands#workspace
    alt-1 = 'workspace 1'
    alt-2 = 'workspace 2'
    alt-3 = 'workspace 3'
    alt-4 = 'workspace 4'
    alt-5 = 'workspace 5'
    alt-6 = 'workspace 6'
    alt-7 = 'workspace 7'
    alt-8 = 'workspace 8'

    # See: https://nikitabobko.github.io/AeroSpace/commands#move-node-to-workspace
    alt-shift-1 = 'move-node-to-workspace 1'
    alt-shift-2 = 'move-node-to-workspace 2'
    alt-shift-3 = 'move-node-to-workspace 3'
    alt-shift-4 = 'move-node-to-workspace 4'
    alt-shift-5 = 'move-node-to-workspace 5'
    alt-shift-6 = 'move-node-to-workspace 6'
    alt-shift-7 = 'move-node-to-workspace 7'
    alt-shift-8 = 'move-node-to-workspace 8'
  
    # See: https://nikitabobko.github.io/AeroSpace/commands#workspace-back-and-forth
    alt-tab = 'workspace-back-and-forth'
    # See: https://nikitabobko.github.io/AeroSpace/commands#move-workspace-to-monitor
    alt-shift-tab = 'move-workspace-to-monitor --wrap-around next'

    # See: https://nikitabobko.github.io/AeroSpace/commands#mode
    alt-shift-semicolon = 'mode service'

# 'service' binding mode declaration.
# See: https://nikitabobko.github.io/AeroSpace/guide#binding-modes
[mode.service.binding]
    esc = ['reload-config', 'mode main']
    r = ['flatten-workspace-tree', 'mode main'] # reset layout
    f = ['layout floating tiling', 'mode main'] # Toggle between floating and tiling layout
    backspace = ['close-all-windows-but-current', 'mode main']
    
    # Reset all windows to their designated workspaces (Shift+R)
    shift-r = [
        'exec-and-forget bash -c "~/.config/aerospace/reset-workspaces.sh"',
        'mode main'
    ]

    # Toggle ChatGPT window to floating (C for ChatGPT)
    c = [
        'exec-and-forget aerospace list-windows --focused --app-bundle-id com.openai.chat --format %{window-id} | xargs -I {} aerospace layout --window-id {} floating',
        'mode main'
    ]

    # sticky is not yet supported https://github.com/nikitabobko/AeroSpace/issues/2
    #s = ['layout sticky tiling', 'mode main']

    alt-shift-h = ['join-with left', 'mode main']
    alt-shift-j = ['join-with down', 'mode main']
    alt-shift-k = ['join-with up', 'mode main']
    alt-shift-l = ['join-with right', 'mode main']

    down = 'volume down'
    up = 'volume up'
    shift-down = ['volume set 0', 'mode main']
    
    # Clean up invisible/background windows (W for Window cleanup)
    w = ['flatten-workspace-tree', 'mode main']

# ---------- App → Workspace rules ----------
# Tip: get IDs with: `aerospace list-apps`

# 1: Code Editors (VS Code)
[[on-window-detected]]
if.app-id = "com.microsoft.VSCode"
run = "move-node-to-workspace 1"

# 2: Productivity Apps (Obsidian, Notes)
[[on-window-detected]]
if.app-id = "md.obsidian"
run = "move-node-to-workspace 2"

# 3: File Management (Finder, Preview, QuickTime)
[[on-window-detected]]
if.app-id = "com.apple.finder"
run = "move-node-to-workspace 3"

[[on-window-detected]]
if.app-id = "com.apple.Preview"
run = "move-node-to-workspace 3"

[[on-window-detected]]
if.app-id = "com.apple.QuickTimePlayerX"
run = "move-node-to-workspace 3"

# 4: Terminal Applications
[[on-window-detected]]
if.app-id = "com.apple.Terminal"
run = "move-node-to-workspace 4"

[[on-window-detected]]
if.app-id = "com.googlecode.iterm2"
run = "move-node-to-workspace 4"

[[on-window-detected]]
if.app-id = "com.mitchellh.ghostty"
run = "move-node-to-workspace 4"

# 5: Web Browsers
[[on-window-detected]]
if.app-id = "company.thebrowser.Browser"
run = "move-node-to-workspace 5"

[[on-window-detected]]
if.app-id = "com.google.Chrome"
run = "move-node-to-workspace 5"

# 6: AI & Chat Applications
# Main ChatGPT windows go to workspace 6
[[on-window-detected]]
if.app-id = "com.openai.chat"
run = "move-node-to-workspace 6"

# ChatGPT quick text box should float (if it has specific window title patterns)
[[on-window-detected]]
if.app-id = "com.openai.chat"
if.window-title-regex-substring = "Quick|Input|Text|Prompt"
run = "layout floating"

[[on-window-detected]]
if.app-id = "com.anthropic.claudefordesktop"
run = "move-node-to-workspace 6"


# 7: Media & Entertainment
[[on-window-detected]]
if.app-id = "com.apple.Music"
run = "move-node-to-workspace 7"

# 8: Communication (Messages, WhatsApp)
[[on-window-detected]]
if.app-id = "com.apple.MobileSMS"
run = "move-node-to-workspace 8"

[[on-window-detected]]
if.app-id = "net.whatsapp.WhatsApp"
run = "move-node-to-workspace 8"

[[on-window-detected]]
if.app-id = "com.microsoft.teams2"
run = "move-node-to-workspace 8"

# Apps that should float and not be assigned to workspaces (background/menu bar apps)
[[on-window-detected]]
if.app-id = "com.1password.1password"
run = "layout floating"

[[on-window-detected]]
if.app-id = "com.1password.1password7"  
run = "layout floating"

[[on-window-detected]]
if.app-id = "com.1password.1password8"
run = "layout floating"

[[on-window-detected]]
if.app-id = "com.agilebits.onepassword7"
run = "layout floating"

[[on-window-detected]]
if.app-id = "com.lwouis.alt-tab-macos"
run = "layout floating"

# Floating Apps (not assigned to specific workspaces)
[[on-window-detected]]
if.app-id = "cc.ffitch.shottr"
run = "layout floating"

[[on-window-detected]]
if.app-id = "com.superduper.superwhisper"
run = "layout floating"
