gui:
  theme:
    activeBorderColor:
      - '#00a3cb'
      - bold
    inactiveBorderColor:
      - '#444860'
    optionsTextColor:
      - '#795ccc'
    selectedLineBgColor:
      - '#37382d'
    selectedRangeBgColor:
      - '#37382d'
    cherryPickedCommitBgColor:
      - '#00a3cb'
    cherryPickedCommitFgColor:
      - '#0e101a'
    unstagedChangesColor:
      - '#e03600'
    defaultFgColor:
      - '#ebefc0'

customCommands:
  - key: "C"
    context: "global"
    command: "code ."
    description: "Open VS Code"
    output: terminal
  - key: "C"
    context: "localBranches"
    prompts:
      - type: "input"
        title: "What are you working on? (paste ticket)"
        key: "Ticket"
    command: "printf '%s\\n' '{{.Form.Ticket}}' > /tmp/lg_ticket && ~/dotfiles/lazygit/scripts/ai-branch.sh"
    loadingText: "Generating branch name with Claude..."
    output: none
    description: "Create branch from ticket"
  - key: "<c-g>"
    context: "commitMessage"
    description: "AI: generate commit message from staged files"
    command: '~/dotfiles/lazygit/scripts/ai-commit.sh | pbcopy'
    loadingText: "Generating commit message with Claude..."
