# Prefix: Ctrl+A
unbind C-b
set-option -g prefix C-a
bind-key C-a send-prefix
set -s escape-time 0

# Reload config
unbind r
bind r source-file ~/.config/tmux/tmux.conf \; display "Config reloaded"

# Base settings
set -g mouse on
set -g base-index 1
set -g pane-base-index 1
set -g renumber-windows on
set -g detach-on-destroy off
set-option -g allow-rename off
set-option -g allow-passthrough on
set-option -g default-terminal "tmux-256color"
set-option -sa terminal-overrides ',xterm-256color:RGB'

# Extended key passthrough (Claude Code, Shift+Enter, etc.)
set -g extended-keys on
set -as terminal-features 'xterm*:extkeys'
set -as terminal-features 'xterm-ghostty:extkeys'
set-environment -g NCURSES_NO_UTF8_ACS 0

# Cursor: blinking bar
set -ga terminal-overrides '*:Ss=\E[%p1%d q:Se=\E[5 q'

# Pane navigation (vim-style, requires prefix — maps to Ghostty Cmd+arrows)
bind-key h select-pane -L
bind-key j select-pane -D
bind-key k select-pane -U
bind-key l select-pane -R


# Pane resize (Cmd+Shift+HJKL via Ghostty → prefix+HJKL)
bind-key H resize-pane -L 5
bind-key J resize-pane -D 5
bind-key K resize-pane -U 5
bind-key L resize-pane -R 5

# Splits (open in current directory)
bind-key | split-window -h -c "#{pane_current_path}"
bind-key '"' split-window -v -c "#{pane_current_path}"
bind-key - split-window -v -c "#{pane_current_path}"

# Kill pane (no confirm)
bind-key x kill-pane

# Sessions
bind-key N new-session
bind-key s display-popup -E -w 80% -h 80% "~/.config/tmux/scripts/sesh-pick.sh"
bind-key w display-popup -E -w 60% -h 40% "~/.config/tmux/scripts/new-worktree.sh"

# Help popup
bind-key ? display-popup -E -w 60% -h 80% "glow -p ~/.config/tmux/scripts/keybinds.md"

# Vi copy mode
set-window-option -g mode-keys vi
bind-key -T copy-mode-vi v send-keys -X begin-selection
bind-key -T copy-mode-vi C-v send-keys -X rectangle-toggle
bind-key -T copy-mode-vi y send-keys -X copy-selection-and-cancel

# Pane borders (active pane highlighted)
set -g pane-border-lines heavy
set -g pane-border-style "fg=#1e2232"
set -g pane-active-border-style "fg=#00a3cb"
set -g pane-border-status bottom
set -g pane-border-format " #[fg=#00a3cb,bold]#P#[default] #[fg=#6c7086]#{b:pane_current_path}#[default] "

# Window naming
set -wg automatic-rename on
set -g automatic-rename-format '#{b:pane_current_path}'
set -g status-interval 5

# Plugins
set -g @plugin 'tmux-plugins/tpm'
set -g @plugin 'tmux-plugins/tmux-sensible'
set -g @plugin 'niksingh710/minimal-tmux-status'

# Status bar background (matches nvim bg_dark)
set -g status-style "bg=#080910,fg=#ebefc0"

# minimal-tmux-status (Duckbones)
set -g @minimal-tmux-bg "#00a3cb"
set -g @minimal-tmux-fg "#0e101a"
set -g @minimal-tmux-justify "left"
set -g @minimal-tmux-use-arrow true
set -g @minimal-tmux-right-arrow ""
set -g @minimal-tmux-left-arrow ""
set -g @minimal-tmux-status "top"
set -g @minimal-tmux-left false
set -g @minimal-tmux-right true

run '~/.config/tmux/plugins/tpm/tpm'
