unbind r
bind r source-file ~/.config/tmux/tmux.conf

set -g mouse on

bind-key h select-pane -L
bind-key j select-pane -D
bind-key k select-pane -U
bind-key l select-pane -R

set-option -g status-position top

# Resize panes with Alt + arrow keys
bind -n M-Left  resize-pane -L 5
bind -n M-Right resize-pane -R 5
bind -n M-Up    resize-pane -U 5
bind -n M-Down  resize-pane -D 5

# Better pane splitting
bind | split-window -h -c "#{pane_current_path}"
bind - split-window -v -c "#{pane_current_path}"
unbind '"'
unbind %

# Easy window switching
bind -n C-S-Left previous-window
bind -n C-S-Right next-window

# Set index start number to 1
set -g base-index 1
setw -g pane-base-index 1

# options
set -g default-terminal 'tmux-256color'
set -g renumber-windows on
set -g mouse on
set-window-option -g mode-keys vi

# Cursor shape configuration - Force blinking line cursor (shape 5)
# Note: Ghostty cursor thickness is controlled in ghostty config file
set -g terminal-overrides ',*:Tc' # true color support
set -ga terminal-overrides ',*:Ss=\E[%p1%d q:Se=\E[5 q' # force blinking line cursor
set -ga terminal-overrides ',xterm*:Ss=\E[%p1%d q:Se=\E[5 q'
set -ga terminal-overrides ',screen*:Ss=\E[%p1%d q:Se=\E[5 q'
# Set default cursor to blinking line (5)
set -g default-command "printf '\e[5 q'; exec $SHELL"

bind-key -T copy-mode-vi v send-keys -X begin-selection
bind-key -T copy-mode-vi C-v send-keys -X rectangle-toggle
bind-key -T copy-mode-vi y send-keys -X copy-selection-and-cancel
bind -n C-k send-keys -R \; clear-history # clear history

# Focus events (for better vim integration)
set -g focus-events on

# Escape time for better vim experience
set -sg escape-time 0

# List of plugins
set -g @plugin 'tmux-plugins/tpm'
set -g @plugin 'tmux-plugins/tmux-sensible'
set -g @plugin 'christoomey/vim-tmux-navigator'
set -g @plugin 'tmux-plugins/tmux-yank'
set -g @plugin 'tmux-plugins/tmux-resurrect'
set -g @plugin 'tmux-plugins/tmux-continuum'

# Tokyo Night Theme Plugin
set -g @plugin 'fabioluciano/tmux-tokyo-night'

# Tokyo Night theme configuration
set -g @theme_variation 'night'
set -g @theme_left_separator ''
set -g @theme_right_separator ''
set -g @theme_plugins 'datetime,weather,battery'
set -g @theme_disable_plugins 0

# Additional theme customization
set -g @theme_active_pane_border_style '#7aa2f7'
set -g @theme_inactive_pane_border_style '#292e42'
set -g @theme_window_with_activity_style 'italics'
set -g @theme_status_bell_style 'bold'

# Status bar configuration (let Tokyo Night theme handle styling)
set -g status-left-length 100
set -g status-right-length 100

# Window style configuration
set -wg automatic-rename on
set -g automatic-rename-format ''
set -g window-status-separator ' '
set -g status-justify 'centre'

# Initialize TMUX plugin manager (keep this line at the very bottom of tmux.conf)
run ~/.config/tmux/plugins/tpm/tpm
